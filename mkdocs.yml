site_name: qrlib
site_description: 面向三维深度学习项目的可复用 Python 库文档
repo_url: https://github.com/qrhuang2021/qrlib
repo_name: qrhuang2021/qrlib
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: indigo

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 教程:
      - 总览: tutorials/index.md
      - 几何归一化工作流: tutorials/geometry-normalization-workflow.md
      - 点云距离指标工作流: tutorials/point-cloud-metrics-workflow.md
  - API:
      - 总览: api/index.md
      - qrlib.geometry: api/geometry.md
      - qrlib.metrics: api/metrics.md
  - 概念:
      - 总览: concepts/index.md
      - 仓库架构: concepts/architecture.md
      - 面向规范开发: concepts/spec-driven-development.md
